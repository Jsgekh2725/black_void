<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Void Upload</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <h1>BLACK VOID</h1>
</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
  <h2>Black Void</h2>
  <button onclick="showPage('uploadPage')">رفع ملف</button>
  <button onclick="showPage('modsPage')">مودات بلاك فويد</button>
  <button onclick="openAdmin()">تحميل مودات</button>
</div>

<div class="container">

<section id="uploadPage" class="page active">
  <h1>رفع ملف وإنشاء رابط مباشر</h1>

  <div class="card">
    <input type="file" id="mainFile">
    <button class="main-btn" onclick="generateLink()">إنشاء رابط تحميل</button>

    <div id="result"></div>
  </div>
</section>

<section id="modsPage" class="page">
  <h1>مودات Black Void</h1>
  <div id="modsContainer" class="mods-grid"></div>
</section>

<section id="adminPage" class="page">
  <h1>لوحة تحميل المودات</h1>

  <div class="card">
    <input type="text" id="modName" placeholder="اسم المود">
    <textarea id="modDesc" placeholder="شرح المود"></textarea>
    <input type="file" id="modFile">

    <button class="main-btn" onclick="saveMod()">تأكيد</button>
  </div>
</section>

</div>

<footer>
  جميع الحقوق محفوظة لـ Black Void
</footer>

<script src="script.js"></script>
</body>
</html>
